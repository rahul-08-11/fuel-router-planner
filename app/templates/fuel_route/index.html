<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Route Planner</title>
  {% load static %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e2e0d8;
      --border-strong: #c8c6bc;
      --text: #1a1917;
      --text-muted: #6b6961;
      --text-faint: #9e9b93;
      --accent: #1a1917;
      --accent-text: #ffffff;
      --green: #1a6b3c;
      --green-bg: #e8f5ee;
      --red: #b03030;
      --red-bg: #fdf0f0;
      --amber: #92600a;
      --amber-bg: #fdf4e3;
      --blue: #1a3a6b;
      --blue-bg: #e8eef5;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    .page-header {
      margin-bottom: 2.5rem;
      border-bottom: 1.5px solid var(--border-strong);
      padding-bottom: 1.25rem;
    }
    .page-header h1 {
      font-size: 28px;
      font-weight: normal;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .page-header p {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    /* Form card */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      font-family: 'Georgia', serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus {
      border-color: var(--border-strong);
      background: var(--surface);
    }
    .field input::placeholder { color: var(--text-faint); }

    .submit-btn {
      width: 100%;
      height: 44px;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      background: var(--red-bg);
      border: 1px solid #f0c0c0;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: var(--red);
      margin-top: 10px;
    }

    /* Results section */
    #results { display: none; }

    .route-headline {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .route-headline strong { color: var(--text); font-weight: 600; }
    .route-headline .arrow { color: var(--text-faint); }

    /* Summary stats */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .summary-card .s-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-faint);
      margin-bottom: 6px;
    }
    .summary-card .s-value {
      font-size: 26px;
      font-weight: normal;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .summary-card .s-unit {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: var(--text-muted);
    }
    .summary-card.highlight { background: var(--green-bg); border-color: #b5dcc6; }
    .summary-card.highlight .s-value { color: var(--green); }

    /* Section label */
    .section-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin-bottom: 10px;
    }

    /* Stop timeline */
    .timeline { position: relative; }

    .timeline-item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 14px;
      align-items: start;
      padding: 14px 18px 14px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .timeline-item:hover { border-color: var(--border-strong); }

    .stop-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .stop-body {}
    .stop-name {
      font-size: 15px;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .stop-meta {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .stop-meta .pill {
      display: inline-block;
      background: var(--amber-bg);
      color: var(--amber);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }

    .stop-right { text-align: right; flex-shrink: 0; }
    .stop-cost {
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .stop-detail {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.6;
    }
    .price-badge {
      display: inline-block;
      background: var(--green-bg);
      color: var(--green);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Origin / destination rows */
    .dest-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px 14px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
    }
    .dest-dot-wrap {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--green-bg);
      border: 1px solid #b5dcc6;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .dest-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
    }
    .dest-label {
      font-size: 15px;
      color: var(--text);
    }
    .dest-sub {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Starting fuel cost badge on origin row */
    .start-cost-right {
      text-align: right;
      flex-shrink: 0;
    }
    .start-cost-value {
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .start-cost-detail {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.6;
    }
    .origin-badge {
      display: inline-block;
      background: var(--blue-bg);
      color: var(--blue);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Footer note */
    .footnote {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .summary-grid .summary-card:last-child { grid-column: span 2; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <h1>Fuel Route Planner</h1>
    <p>Finds cheapest gas stops along your drive — zero extra API calls</p>
  </div>

  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>From</label>
        <input type="text" id="start" placeholder="Chicago, IL" value="Chicago, IL" />
      </div>
      <div class="field">
        <label>To</label>
        <input type="text" id="end" placeholder="Los Angeles, CA" value="Los Angeles, CA" />
      </div>
    </div>
    <button class="submit-btn" id="go-btn" onclick="planRoute()">Plan route</button>
    <div id="error-area"></div>
  </div>

  <div id="results">
    <div class="route-headline">
      <strong id="r-start"></strong>
      <span class="arrow">→</span>
      <strong id="r-end"></strong>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="s-label">Estimated Distance</div>
        <div class="s-value"><span id="s-miles">—</span> <span class="s-unit">mi</span></div>
      </div>
      <div class="summary-card highlight">
        <div class="s-label">Total Estimated Cost</div>
        <div class="s-value">$<span id="s-cost">—</span></div>
      </div>
      <div class="summary-card">
        <div class="s-label">Fuel Stops</div>
        <div class="s-value"><span id="s-stops">—</span></div>
      </div>
    </div>

    <div class="section-label">Route &amp; Stops</div>
    <div class="timeline">

      <!-- Origin row — shows starting tank fuel cost -->
      <div class="dest-row" id="start-row">
        <div class="dest-dot-wrap" style="background:#f0f0f0; border-color: var(--border);">
          <div class="dest-dot" style="background: var(--text-muted);"></div>
        </div>
        <div>
          <div class="dest-label" id="start-label"></div>
          <div class="dest-sub" id="start-sub">Starting point — full tank</div>
        </div>
        <!-- Starting fuel cost shown only when > 0 -->
        <div class="start-cost-right" id="start-cost-col" style="display:none;">
          <div class="start-cost-value" id="start-cost-value"></div>
          <div class="start-cost-detail">
            <span class="origin-badge">Starting tank</span><br>
            <span id="start-cost-gallons"></span>
          </div>
        </div>
      </div>

      <!-- Fuel stops injected here -->
      <div id="stops-list"></div>

      <!-- Destination -->
      <div class="dest-row">
        <div class="dest-dot-wrap">
          <div class="dest-dot"></div>
        </div>
        <div>
          <div class="dest-label" id="dest-label"></div>
          <div class="dest-sub">Destination</div>
        </div>
      </div>

    </div>

    <div class="footnote" id="footnote-text"></div>
  </div>

</div>

<script>
  const CSRF = '{{ csrf_token }}';

  async function planRoute() {
    const start = document.getElementById('start').value.trim();
    const end   = document.getElementById('end').value.trim();
    const btn   = document.getElementById('go-btn');
    const err   = document.getElementById('error-area');
    const res   = document.getElementById('results');

    err.innerHTML = '';
    res.style.display = 'none';

    if (!start || !end) {
      err.innerHTML = '<div class="error-box">Please enter both a start and end city (e.g. Chicago, IL).</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Calculating…';

    try {
      const resp = await fetch('/api/route', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': CSRF,
        },
        body: JSON.stringify({ start, end }),
      });

      const data = await resp.json();

      if (!resp.ok) {
        throw new Error(data.error || 'Server error — please try again.');
      }

      // ── Summary ───────────────────────────────────────────────────────
      document.getElementById('r-start').textContent  = data.start;
      document.getElementById('r-end').textContent    = data.end;
      document.getElementById('s-miles').textContent  = Math.round(data.total_distance_miles).toLocaleString();
      document.getElementById('s-cost').textContent   = Number(data.total_fuel_cost_usd).toFixed(2);
      document.getElementById('s-stops').textContent  = data.fuel_stops.length;
      document.getElementById('start-label').textContent = data.start;
      document.getElementById('dest-label').textContent  = data.end;

      // ── Starting tank cost ────────────────────────────────────────────
      const startingCost = Number(data.starting_fuel_cost_usd || 0);
      const startCostCol = document.getElementById('start-cost-col');

      if (startingCost > 0) {
        // Gallons = cost / price of first stop (best estimate available)
        // We just display the cost and derive gallons from MPG and miles to first stop
        const milestoFirstStop = data.fuel_stops.length > 0
          ? data.fuel_stops[0].mile_marker
          : data.total_distance_miles;
        const gallonsUsed = (milestoFirstStop / data.mpg).toFixed(1);

        document.getElementById('start-cost-value').textContent = `$${startingCost.toFixed(2)}`;
        document.getElementById('start-cost-gallons').textContent = `${gallonsUsed} gallons used`;
        document.getElementById('start-sub').textContent = 'Starting point — full tank';
        startCostCol.style.display = 'block';
      } else {
        startCostCol.style.display = 'none';
        document.getElementById('start-sub').textContent = 'Starting point — full tank';
      }

      // ── Fuel stops ────────────────────────────────────────────────────
      const list = document.getElementById('stops-list');
      list.innerHTML = '';

      data.fuel_stops.forEach((stop, i) => {
        const gallons = Number(stop.gallons_purchased).toFixed(1);
        const price   = Number(stop.price_per_gallon).toFixed(3);
        const cost    = Number(stop.stop_cost_usd).toFixed(2);
        const mile    = Math.round(stop.mile_marker).toLocaleString();
        const addr    = [stop.address, stop.city, stop.state].filter(Boolean).join(', ');

        const card = document.createElement('div');
        card.className = 'timeline-item';
        card.innerHTML = `
          <div class="stop-badge">${i + 1}</div>
          <div class="stop-body">
            <div class="stop-name">${stop.name}</div>
            <div class="stop-meta">
              ${addr}<br>
              <span class="pill">Mile ${mile}</span>
            </div>
          </div>
          <div class="stop-right">
            <div class="stop-cost">$${cost}</div>
            <div class="stop-detail">
              <span class="price-badge">$${price}/gal</span><br>
              ${gallons} gallons
            </div>
          </div>
        `;
        list.appendChild(card);
      });

      // ── Footnote ──────────────────────────────────────────────────────
      document.getElementById('footnote-text').textContent =
        `Assumes ${data.mpg} mpg · 500-mile tank · Total cost includes fuel burned from starting tank · Prices sourced from local fuel database`;

      res.style.display = 'block';
      res.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (e) {
      err.innerHTML = `<div class="error-box">${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Plan route';
    }
  }

  ['start', 'end'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') planRoute();
    });
  });
</script>
</body>
</html>
